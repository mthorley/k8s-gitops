apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-fetch
  namespace: kagent
spec:
  transportType: stdio
  stdioTransport: {}
  deployment:
    image: mcp/fetch:latest
    cmd: mcp-server-fetch
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: mcp-fetch
  namespace: kagent
spec:
  description: Generic HTTP fetch MCP server (mcp/fetch).
  protocol: STREAMABLE_HTTP
  url: http://mcp-fetch.kagent:3000/mcp
  timeout: 30s
  sseReadTimeout: 5m0s
