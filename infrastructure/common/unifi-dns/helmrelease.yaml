---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app unifi-dns
spec:
  chartRef:
    kind: OCIRepository
    name: unifi-dns
  interval: 1h
  values:
    fullnameOverride: *app
    serviceAccount:
# Avoid race condition, not a config bug: kustomize-controller applied the secrets-eso-vault
# component's ServiceAccount-token Secret (annotated to bind SA unifi-dns) before the 
# Helm-chart-managed unifi-dns ServiceAccount existed. Kubernetes' legacy token-cleanup 
# controller deletes orphaned service-account-token Secrets referencing a nonexistent SA, 
# so it got swept — which cascaded: SecretStore → ExternalSecret → 
# the real UniFi API token Secret never materialized → the webhook sidecar couldn't start → 
# external-dns crash-looped.
      create: false
      name: *app
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/kashalls/external-dns-unifi-webhook
          tag: v0.8.0@sha256:fb2f74fdd0fc9fa22b95b525ccca9958715c0963d317da23b5f858858443dabe
        env:
          - name: UNIFI_HOST
            value: https://unifi
          - name: UNIFI_API_KEY
            valueFrom:
              secretKeyRef:
                name: secret-unifi-dns
                key: unifi-dns-api-token
        livenessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
    triggerLoopOnEvent: true
    policy: sync
    sources:
      - gateway-httproute
      - service
    txtOwnerId: main
    txtPrefix: k8s.main.
    domainFilters:
      - ${domain}
    serviceMonitor:
      enabled: true
