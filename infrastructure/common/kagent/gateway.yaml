apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: kagent-gateway
  namespace: kagent
spec:
  gatewayClassName: nginx
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "kagent.${domain}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${APP}-tls-prod"
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: kagent-ui
  namespace: kagent
spec:
  parentRefs:
    - name: kagent-gateway
  hostnames:
    - "kagent.${domain}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kagent-ui
          port: 8080
