apiVersion: batch/v1
kind: CronJob
metadata:
  name: "${APP}-backup"
spec:
  schedule: "${BACKUP_SCHEDULE}"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: "${APP}-backup"
            image: alpine:3
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - |
              set -e
              mkdir -p "/backup/${APP}"
              DATE="$(date +%Y%m%d_%H%M%S)"
              tar czf "/backup/${APP}/${APP}_$DATE.tar.gz" -C /source .
              cd "/backup/${APP}" && ls -1t ${APP}_*.tar.gz | tail -n +11 | xargs -r rm -f
            volumeMounts:
              - name: source
                mountPath: /source
                readOnly: true
              - name: nfs-volume
                mountPath: /backup
          restartPolicy: OnFailure
          volumes:
            - name: source
              persistentVolumeClaim:
                claimName: "${BACKUP_SOURCE_CLAIM}"
            - name: nfs-volume
              nfs:
                server: "${qnap_ip}"
                path: "/k8s/backup/${cluster_id}/${APP}"
