# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kagent
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure
  interval: 30m0s
  path: ./infrastructure/common/kagent
  prune: true
  postBuild:
    substitute:
      APP: "kagent"
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: kagent
  wait: false
