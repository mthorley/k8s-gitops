# Source: kagent/templates/ui-nginx-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: kagent-ui-config
  namespace: kagent
  labels:
    helm.sh/chart: kagent-0.9.1
    app.kubernetes.io/name: kagent
    app.kubernetes.io/instance: kagent
    app.kubernetes.io/version: "0.9.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: kagent
data:
  nginx.conf: |
    pid /tmp/nginx.pid;
    
    error_log /dev/stderr;
    
    events {
        worker_connections 1024;
    }
    
    http {
        client_body_temp_path /tmp/nginx/client_temp;
        proxy_temp_path /tmp/nginx/proxy_temp;
        fastcgi_temp_path /tmp/nginx/fastcgi_temp;
        uwsgi_temp_path /tmp/nginx/uwsgi_temp;
        scgi_temp_path /tmp/nginx/scgi_temp;
    
        access_log /dev/stdout;
    
        log_format main        '[$time_local] $remote_addr - $remote_user - $request $status $body_bytes_sent $http_referer $http_user_agent $http_x_forwarded_for';
        log_format upstreamlog '[$time_local] $remote_addr - $remote_user - $server_name $host to: $upstream_addr: $request $status upstream_response_time $upstream_response_time msec $msec request_time $request_time';
    
        upstream kagent_ui {
            server 127.0.0.1:8001;
        }
    
        upstream kagent_ws_backend {
            server 127.0.0.1:8081;
        }
    
        upstream kagent_backend {
            server 127.0.0.1:8083;
        }
    
        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }
    
        server {
            listen 8080;
            server_name localhost;
    
            location /a2a/ {
                proxy_pass http://kagent_ui/a2a/;
                proxy_http_version 1.1;
                proxy_set_header Connection '';
                proxy_set_header Host $host;
                proxy_set_header X-Forwarded-Host $host;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Origin $scheme://$host;
                proxy_read_timeout 600s;
                proxy_send_timeout 600s;
                proxy_buffering off;
            }
    
            location / {
                proxy_pass http://kagent_ui;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Forwarded-Host $host;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Origin $scheme://$host;
                proxy_cache_bypass $http_upgrade;
            }
    
            location /health {
                return 200 'OK';
            }
    
            location /api/ {
                proxy_pass http://kagent_backend/api/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $server_name;
                proxy_cache_bypass $http_upgrade;
            }
    
            location /api/ws/ {
                proxy_pass http://kagent_ws_backend/api/ws/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $server_name;
                proxy_read_timeout 300s;
                proxy_send_timeout 300s;
                proxy_buffering off;
            }
        }
    }
    
  supervisord.conf: |
    [supervisord]
    nodaemon=true
    logfile=/dev/stdout
    logfile_maxbytes=0
    loglevel=debug
    
    [program:nginx]
    command=/usr/sbin/nginx -g "daemon off;"
    autostart=true
    autorestart=true
    startretries=5
    numprocs=1
    startsecs=0
    priority=20
    stdout_logfile=/dev/stdout
    stdout_logfile_maxbytes=0
    stderr_logfile=/dev/stderr
    stderr_logfile_maxbytes=0
    stdout_events_enabled=true
    stderr_events_enabled=true
    
    [program:nextjs]
    command=node /app/ui/server.js
    directory=/app/ui
    environment=PORT=8001,HOSTNAME="0.0.0.0",NODE_ENV=production,PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    autostart=true
    autorestart=true
    startretries=5
    numprocs=1
    startsecs=0
    priority=10
    stdout_logfile=/dev/stdout
    stdout_logfile_maxbytes=0
    stderr_logfile=/dev/stderr
    stderr_logfile_maxbytes=0
    stdout_events_enabled=true
    stderr_events_enabled=true
