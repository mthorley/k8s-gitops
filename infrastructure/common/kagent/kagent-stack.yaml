      labels:
        app.kubernetes.io/name: kmcp
        app.kubernetes.io/instance: kagent
        control-plane: controller-manager
    spec:
      serviceAccountName: kagent-kmcp-controller-manager
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
